name: build and release docker image
on:
  push:
    branches:
      - main
env:
  REGISTRY: ghcr.io

jobs:
  tagging:
    name: 태깅 수행
    runs-on: ubuntu-latest  #최신 Ubuntu 가상 머신을 생성하여 실행
    permissions:
      contents: write  #github actions가 github에 대해 어떤 권한을 가질지 설정
    outputs:
      tag_name: ${{ steps.tag_version.outputs.new_tag}}
    steps:
      - uses: actions/checkout@v6
      - name: 버저닝 및 태깅
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{secrets.GITHUB_TOKEN}}
      - name: Release
        uses: ncipollo/release-action@v1
        with:
            tag: ${{steps.tag_version.outputs.new_tag}}
            name: ${{steps.tag_version.outputs.new_tag}}
            body: ${{steps.tag_version.outputs.changelog}}

  build-push-image:
    name: 도커 이미지 빌드 및 푸쉬
    runs-on: ubuntu-latest
    needs: tagging
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Repository로부터 Worker Instace로 파일을 checkout
        uses: actions/checkout@v6
      - name: gradlew 권한 설정
        run: chmod +x ./gradlew
      - name: JDK 설정
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
      - name: Gradle을 통한 JAR파일 빌드
        run: ./gradlew build -x test
      - name: 레지스트리 로그인
        uses: docker/login-action@v4
        with:
          registry: ${{env.REGISTRY}}
          username: ${{github.actor}}
          password: ${{secrets.GITHUB_TOKEN}}

      - name: 메타데이터 추출
        uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{env.REGISTRY}}/${{github.repository}}
          tags: |
            type=raw,value=${{needs.tagging.outputs.tag_name}}
            type=raw,value=latest
      - name: 빌드 및 이미지 푸시 수행
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{steps.meta.outputs.tags}}

  deploy:
    runs-on: self-hosted
    needs: build-push-image
    steps:
      - name: 배포
        run: |
          cd /home/ubuntu
          sudo docker compose down
          sudo docker compose pull
          sudo docker compose up -d
