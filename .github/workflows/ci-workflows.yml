name: CI test
on:
  pull_request:
    branches:
      - dev
      - main
jobs:
  code-test:
    name: 코드테스트
    runs-on: ubuntu-latest
    steps:
      - name: 브랜치의 소스코드 체크아웃 실행
        uses: actions/checkout@v6

      - name: 테스트용 JDK 설치
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: gradle   #캐시 설정

      - name: gradlew 권한 설정
        run: chmod +x ./gradlew

      - name: 테스트 실행
        run: ./gradlew test --no-daemon
        env:
          SPRING_PROFILES_ACTIVE: test