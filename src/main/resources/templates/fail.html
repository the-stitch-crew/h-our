<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/fail-page.css">
    <title>결제 실패</title>
</head>
<body>
<main class="failure-container">
    <div class="failure-icon" aria-hidden="true">!</div>

    <h1 class="failure-title">결제에 실패했습니다</h1>
    <p class="failure-subtitle" id="failMessage">결제 과정에서 문제가 발생했습니다.</p>

    <div class="order-summary">
        <h2>주문 정보</h2>
        <div class="summary-row">
            <span class="summary-label">주문번호</span>
            <span class="summary-value" id="orderNumber">-</span>
        </div>
        <div class="summary-row">
            <span class="summary-label">결제금액</span>
            <span class="summary-value" id="amount">-</span>
        </div>
    </div>

    <div class="action-buttons">
        <button type="button" class="btn btn-primary" id="retryButton">다시 시도</button>
        <a href="/" class="btn btn-secondary">홈으로</a>
    </div>
</main>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const orderNumber = urlParams.get("orderNumber");
    const amount = Number(urlParams.get("amount") || 0);
    const message = urlParams.get("message");

    document.getElementById("orderNumber").textContent = orderNumber || "-";
    document.getElementById("amount").textContent = amount > 0 ? amount.toLocaleString("ko-KR") + "원" : "-";

    if (message) {
        document.getElementById("failMessage").textContent = message;
    }

    document.getElementById("retryButton").addEventListener("click", async function () {
        if (!orderNumber) {
            location.href = "/";
            return;
        }

        const accessToken = localStorage.getItem("hourAccessToken");
        const response = await fetch("/api/payments/orders/" + encodeURIComponent(orderNumber), {
            headers: {
                Authorization: "Bearer " + accessToken,
            },
        });

        if (!response.ok) {
            location.href = "/api/payments/test-login";
            return;
        }

        const html = await response.text();
        document.open();
        document.write(html);
        document.close();
    });
</script>
</body>
</html>
