<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>결제 영수증</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            padding: 24px;
            background: #f8f9fa;
            color: #212529;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .receipt {
            width: 100%;
            max-width: 520px;
            margin: 0 auto;
            background: #fff;
            border: 1px solid #e9ecef;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        .header {
            padding: 28px 28px 20px;
            border-bottom: 1px solid #e9ecef;
        }

        .eyebrow {
            margin: 0 0 8px;
            color: #3182f6;
            font-size: 13px;
            font-weight: 700;
        }

        h1 {
            margin: 0;
            font-size: 26px;
            line-height: 1.3;
        }

        .status {
            display: inline-flex;
            margin-top: 16px;
            padding: 6px 10px;
            border-radius: 999px;
            background: #e7f5ff;
            color: #1864ab;
            font-size: 13px;
            font-weight: 700;
        }

        .content {
            padding: 24px 28px 28px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            padding: 13px 0;
            border-bottom: 1px solid #f1f3f5;
            font-size: 14px;
        }

        .row:last-child {
            border-bottom: 0;
        }

        .label {
            flex: 0 0 104px;
            color: #6c757d;
        }

        .value {
            min-width: 0;
            color: #212529;
            font-weight: 600;
            text-align: right;
            overflow-wrap: anywhere;
        }

        .actions {
            display: flex;
            gap: 10px;
            padding: 20px 28px 28px;
            border-top: 1px solid #e9ecef;
        }

        .button {
            flex: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            padding: 0 14px;
            border: 0;
            border-radius: 8px;
            background: #3182f6;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            text-decoration: none;
        }

        .button.secondary {
            background: #f1f3f5;
            color: #495057;
        }

        @media print {
            body {
                padding: 0;
                background: #fff;
            }

            .receipt {
                max-width: none;
                border: 0;
                box-shadow: none;
            }

            .actions {
                display: none;
            }
        }
    </style>
</head>
<body>
<main class="receipt">
    <section class="header">
        <p class="eyebrow">H-OUR PAYMENT</p>
        <h1>결제 영수증</h1>
        <span class="status" th:text="${payment.paymentStatus}">COMPLETED</span>
    </section>

    <section class="content">
        <div class="row">
            <span class="label">결제번호</span>
            <span class="value" th:text="${payment.paymentId}">1</span>
        </div>
        <div class="row">
            <span class="label">주문번호</span>
            <span class="value" th:text="${payment.orderNumber}">order-number</span>
        </div>
        <div class="row">
            <span class="label">결제수단</span>
            <span class="value" th:text="${payment.paymentMethod}">EASY_PAY</span>
        </div>
        <div class="row">
            <span class="label">요청일시</span>
            <span class="value" th:text="${payment.requestedAt}">requestedAt</span>
        </div>
        <div class="row">
            <span class="label">승인일시</span>
            <span class="value" th:text="${payment.approvedAt ?: '-'}">approvedAt</span>
        </div>
        <div class="row">
            <span class="label">토스 영수증</span>
            <span class="value" th:text="${payment.pgReceiptUrl ?: '-'}">receiptUrl</span>
        </div>
    </section>

    <section class="actions">
        <button type="button" class="button" onclick="window.print()">인쇄</button>
        <a href="/" class="button secondary">홈으로</a>
    </section>
</main>
</body>
</html>
