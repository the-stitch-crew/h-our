spring:
  datasource:
    url: jdbc:postgresql://localhost:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop

    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true
logging:
  level:
    root: info
    stitch.crew.hour: debug

custom:
  jwt:
    validations:
      access: 900000  # 15분
      refresh: 604800000  #7일
    payload:
      issuer: hour
      subject-access-token: access-token
      subject-refresh-token: refresh-token
    secrets:
      app-key: ${JWT_APP_KEY}
      origin-key: ${JWT_SECRET_KEY}
