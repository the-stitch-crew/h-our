spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:.env.test[.properties]
  security:
    oauth2:
      client:
        registration:
          google:
            client-name: Google
            client-id: test-google-client-id
            client-secret: test-google-client-secret
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - email
              - profile
  sql:
    init:
      mode: never
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;NON_KEYWORDS=USER;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  cloud:
    aws:
      region:
        static: ap-northeast-2


custom:
  jwt:
    validations:
      access: 900000
      refresh: 604800000
    payload:
      issuer: hour
      subject-access-token: access-token
      subject-refresh-token: refresh-token
    secrets:
      app-key: test-jwt-app-key-test-jwt-app-key-test-jwt-app-key-test-jwt-app-key
      origin-key: test-jwt-origin-key
  redis:
    host: localhost
    port: 6379
  oauth:
    signup-token-ttl-ms: 600000
  s3:
    bucket-name: test
    access-key: test
    secret-key: test

app:
  frontend:
    base-url: http://localhost:5173

