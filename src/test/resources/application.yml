spring:
  sql:
    init:
      mode: always
  h2:
    console:
      enabled: true
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;NON_KEYWORDS=USER;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

custom:
  jwt:
    validations:
      access: 900000
      refresh: 604800000
    payload:
      issuer: hour
      subject-access-token: access-token
      subject-refresh-token: refresh-token
    secrets:
      app-key: test-jwt-secret-key-must-be-at-least-32-bytes
      origin-key: test-jwt-origin-key
