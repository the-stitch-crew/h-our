spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:.env.test[.properties]
  sql:
    init:
      mode: never
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;NON_KEYWORDS=USER;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  cloud:
    aws:
      region:
        static: ${S3_REGION}


custom:
  redis:
    host: localhost
    port: 6379
  s3:
    bucket-name: ${S3_BUCKET}
    access-key: ${S3_ACCESS_KEY}
    secret-key: ${S3_SECRET_KEY}